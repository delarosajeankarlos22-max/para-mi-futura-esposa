<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> lo bella que eres ❤️</title>
<link rel="stylesheet" href="style.css">

<style>
img{
width:90%;
max-width:350px;
border-radius:20px;
box-shadow:0 0 25px #ff2d75;
margin:20px 0;
transition:.4s;
}

.botones{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

button{
padding:15px 25px;
}
</style>

</head>

<body>

<div class="container">

<h1>📸 Nuestros recuerdos</h1>

<img id="foto">

<div class="botones">

<button onclick="anterior()">⬅️</button>

<button onclick="siguiente()">➡️</button>

</div>

<br>

<button onclick="location.href='carta.html'">
Volver ❤️
</button>

</div>

<script>

const fotos=[

"assets/2346E06E-0034-49A3-A9F8-426B9C18ACC7.JPG",

"assets/79D036B4-1569-4C4C-AF9B-CE53C7BC373B.JPG",

"assets/7A229F0B-3CC8-4C11-9653-C3A3C84DA086.JPG",

"assets/9F2BFCA2-9CBD-49FC-8FB0-B7BBFE5700F3.JPG",

"assets/A22100C9-65FB-4E42-A45C-8B5B18482F05.JPG",

"assets/A5F512EA-881A-4272-A69D-648646749AAB.JPG",

"assets/A663523F-0AB6-4421-9C88-011E7F1B3351.JPG",

"assets/C7746545-F085-46DF-9B76-5C3F7D208DFE.JPG",

"assets/CA56FA98-3687-4403-B44A-B89582922ADA.JPG",

"assets/F2CC40E4-1EF9-456B-AF21-BECF71F10021.JPG"

];

let i=0;

const img=document.getElementById("foto");

img.src=fotos[i];

function siguiente(){

i++;

if(i>=fotos.length)i=0;

img.src=fotos[i];

}

function anterior(){

i--;

if(i<0)i=fotos.length-1;

img.src=fotos[i];

}

setInterval(siguiente,4000);

</script>

</body>
</html>
